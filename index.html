<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Control Dashboard</title>
    <!-- React & Babel for JSX -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-nums { font-variant-numeric: tabular-nums; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Icon components (simplified Lucide-like icons for CDN usage)
        const Plus = ({ size = 18 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        );
        const Minus = ({ size = 18 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        );
        const Play = ({ size = 18, fill = "none" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
        );
        const Pause = ({ size = 18, fill = "none" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
        );
        const RotateCcw = ({ size = 18 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
        );
        const Trash2 = ({ size = 18 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
        );
        const UserPlus = ({ size = 18 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="17" y1="11" x2="23" y2="11"></line></svg>
        );
        const Maximize = ({ size = 18 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
        );
        const Minimize = ({ size = 18 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path></svg>
        );
        const Sun = ({ size = 18 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        );
        const Moon = ({ size = 18 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        );
        const StickyNote = ({ size = 18 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15.5 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8.5L15.5 3z"></path><path d="M15 3v6h6"></path><line x1="9" y1="13" x2="15" y2="13"></line><line x1="9" y1="17" x2="15" y2="17"></line></svg>
        );

        const COLOR_SCHEMES = [
            { id: 'blue', border: 'border-blue-400', text: 'text-blue-600', ring: 'ring-blue-50', btn: 'bg-blue-600 hover:bg-blue-700', lightBg: 'bg-blue-50', footerBg: 'bg-blue-100/50', darkBg: 'bg-blue-900/20', darkText: 'text-blue-400', darkRing: 'ring-blue-900/30' },
            { id: 'purple', border: 'border-purple-400', text: 'text-purple-600', ring: 'ring-purple-50', btn: 'bg-purple-600 hover:bg-purple-700', lightBg: 'bg-purple-50', footerBg: 'bg-purple-100/50', darkBg: 'bg-purple-900/20', darkText: 'text-purple-400', darkRing: 'ring-purple-900/30' },
            { id: 'emerald', border: 'border-emerald-400', text: 'text-emerald-600', ring: 'ring-emerald-50', btn: 'bg-emerald-600 hover:bg-emerald-700', lightBg: 'bg-emerald-50', footerBg: 'bg-emerald-100/50', darkBg: 'bg-emerald-900/20', darkText: 'text-emerald-400', darkRing: 'ring-emerald-900/30' },
            { id: 'amber', border: 'border-amber-400', text: 'text-amber-600', ring: 'ring-amber-50', btn: 'bg-amber-600 hover:bg-amber-700', lightBg: 'bg-amber-50', footerBg: 'bg-amber-100/50', darkBg: 'bg-amber-900/20', darkText: 'text-amber-400', darkRing: 'ring-amber-900/30' },
            { id: 'rose', border: 'border-rose-400', text: 'text-rose-600', ring: 'ring-rose-50', btn: 'bg-rose-600 hover:bg-rose-700', lightBg: 'bg-rose-50', footerBg: 'bg-rose-100/50', darkBg: 'bg-rose-900/20', darkText: 'text-rose-400', darkRing: 'ring-rose-900/30' },
            { id: 'indigo', border: 'border-indigo-400', text: 'text-indigo-600', ring: 'ring-indigo-50', btn: 'bg-indigo-600 hover:bg-indigo-700', lightBg: 'bg-indigo-50', footerBg: 'bg-indigo-100/50', darkBg: 'bg-indigo-900/20', darkText: 'text-indigo-400', darkRing: 'ring-indigo-900/30' },
            { id: 'teal', border: 'border-teal-400', text: 'text-teal-600', ring: 'ring-teal-50', btn: 'bg-teal-600 hover:bg-teal-700', lightBg: 'bg-teal-50', footerBg: 'bg-teal-100/50', darkBg: 'bg-teal-900/20', darkText: 'text-teal-400', darkRing: 'ring-teal-900/30' },
        ];

        const TIME_ZONES = [
            { label: 'Local Time', value: Intl.DateTimeFormat().resolvedOptions().timeZone },
            { label: 'London, UK', value: 'Europe/London' },
            { label: 'New York, USA', value: 'America/New_York' },
            { label: 'Tokyo, Japan', value: 'Asia/Tokyo' },
            { label: 'Dubai, UAE', value: 'Asia/Dubai' },
            { label: 'Paris, France', value: 'Europe/Paris' },
            { label: 'Sydney, Australia', value: 'Australia/Sydney' },
            { label: 'Singapore', value: 'Asia/Singapore' },
        ];

        const App = () => {
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [students, setStudents] = useState([
                { id: 1, name: 'Alex Johnson', exam: 'Math 101', secondsLeft: 3600, isRunning: false, initialSeconds: 3600, color: COLOR_SCHEMES[0], notes: '', showNotes: false },
                { id: 2, name: 'Sarah Miller', exam: 'History Midterm', secondsLeft: 5400, isRunning: false, initialSeconds: 5400, color: COLOR_SCHEMES[1], notes: '', showNotes: false }
            ]);

            const [currentTime, setCurrentTime] = useState(new Date());
            const [selectedTimeZone, setSelectedTimeZone] = useState(TIME_ZONES[0].value);
            const [fullscreenStudentId, setFullscreenStudentId] = useState(null);
            const [newName, setNewName] = useState('');
            const [newExam, setNewExam] = useState('');
            const [newHours, setNewHours] = useState(1);
            const [newMinutes, setNewMinutes] = useState(0);
            const [showAddForm, setShowAddForm] = useState(false);

            useEffect(() => {
                const interval = setInterval(() => {
                    setCurrentTime(new Date());
                    setStudents((prev) =>
                        prev.map((s) => {
                            if (s.isRunning && s.secondsLeft > 0) {
                                return { ...s, secondsLeft: s.secondsLeft - 1 };
                            }
                            if (s.secondsLeft === 0 && s.isRunning) {
                                return { ...s, isRunning: false };
                            }
                            return s;
                        })
                    );
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            const formatTZTime = (date, tz) => {
                return new Intl.DateTimeFormat('en-US', {
                    timeZone: tz,
                    hour: 'numeric',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: true
                }).format(date);
            };

            const formatHHMM = (date, tz) => {
                return new Intl.DateTimeFormat('en-US', {
                    timeZone: tz,
                    hour: 'numeric',
                    minute: '2-digit',
                    hour12: true
                }).format(date);
            };

            const formatTime = (totalSeconds, showHours = true) => {
                const hrs = Math.floor(totalSeconds / 3600);
                const mins = Math.floor((totalSeconds % 3600) / 60);
                const secs = totalSeconds % 60;
                if (showHours) {
                    return `${hrs}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                }
                return `${hrs > 0 ? hrs + ':' : ''}${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            };

            const addStudent = (e) => {
                e.preventDefault();
                if (!newName || !newExam) return;
                const totalSeconds = (parseInt(newHours) * 3600) + (parseInt(newMinutes) * 60);
                const colorIndex = students.length % COLOR_SCHEMES.length;
                
                const newStudent = {
                    id: Date.now(),
                    name: newName,
                    exam: newExam,
                    secondsLeft: totalSeconds,
                    initialSeconds: totalSeconds,
                    isRunning: false,
                    color: COLOR_SCHEMES[colorIndex],
                    notes: '',
                    showNotes: false
                };
                setStudents([...students, newStudent]);
                setNewName('');
                setNewExam('');
                setShowAddForm(false);
            };

            const adjustTime = (id, seconds) => {
                setStudents(students.map(s => 
                    s.id === id ? { ...s, secondsLeft: Math.max(0, s.secondsLeft + seconds) } : s
                ));
            };

            const toggleTimer = (id) => {
                setStudents(students.map(s => 
                    s.id === id ? { ...s, isRunning: !s.isRunning } : s
                ));
            };

            const resetTimer = (id) => {
                setStudents(students.map(s => 
                    s.id === id ? { ...s, secondsLeft: s.initialSeconds, isRunning: false } : s
                ));
            };

            const removeStudent = (id) => {
                setStudents(students.filter(s => s.id !== id));
            };

            const updateNotes = (id, notes) => {
                setStudents(students.map(s => s.id === id ? { ...s, notes } : s));
            };

            const toggleNotes = (id) => {
                setStudents(students.map(s => s.id === id ? { ...s, showNotes: !s.showNotes } : s));
            };

            const onDragStart = (e, index) => {
                e.dataTransfer.setData('index', index);
            };

            const onDragOver = (e) => {
                e.preventDefault();
            };

            const onDrop = (e, dropIndex) => {
                const dragIndex = parseInt(e.dataTransfer.getData('index'));
                if (dragIndex === dropIndex) return;
                
                const newStudents = [...students];
                const [draggedItem] = newStudents.splice(dragIndex, 1);
                newStudents.splice(dropIndex, 0, draggedItem);
                setStudents(newStudents);
            };

            const currentDate = new Date().toLocaleDateString('en-US', { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
            });

            const fullscreenStudent = students.find(s => s.id === fullscreenStudentId);

            return (
                <div className={`min-h-screen p-4 md:p-8 transition-colors duration-500 ${isDarkMode ? 'bg-slate-950 text-slate-100' : 'bg-slate-50 text-slate-900'}`}>
                    <header className={`max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-baseline mb-8 border-b-2 border-slate-200 dark:border-slate-800 pb-4 ${fullscreenStudentId ? 'opacity-20 blur-sm pointer-events-none' : ''}`}>
                        <div className="flex items-center gap-6">
                            <img src="logo.png" alt="Exam Timer Logo" className="h-24 md:h-32 w-auto object-contain drop-shadow-xl" />
                            <div>
                                <h1 className={`text-4xl font-black tracking-tight uppercase ${isDarkMode ? 'text-white' : 'text-slate-800'}`}>Exam Control</h1>
                                <p className={`font-medium mt-1 uppercase tracking-widest text-sm ${isDarkMode ? 'text-slate-400' : 'text-slate-500'}`}>Room Proctoring Dashboard</p>
                            </div>
                        </div>
                        <div className="mt-4 md:mt-0 text-right flex flex-col items-end gap-2">
                            <div className="flex flex-col items-end">
                                <span className="text-slate-500 dark:text-slate-400 font-bold uppercase text-[10px] tracking-[0.2em] mb-1">World Clock</span>
                                <div className={`flex items-center gap-3 px-4 py-2 rounded-xl border shadow-sm transition-colors ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'}`}>
                                    <select 
                                        value={selectedTimeZone} 
                                        onChange={(e) => setSelectedTimeZone(e.target.value)}
                                        className={`bg-transparent text-xs font-bold outline-none cursor-pointer border-r pr-3 mr-1 transition-colors ${isDarkMode ? 'text-slate-300 border-slate-700' : 'text-slate-600 border-slate-200'}`}
                                    >
                                        {TIME_ZONES.map(tz => (
                                            <option key={tz.value} value={tz.value} className={isDarkMode ? 'bg-slate-900' : 'bg-white'}>{tz.label}</option>
                                        ))}
                                    </select>
                                    <span className={`text-xl font-black tab-nums ${isDarkMode ? 'text-white' : 'text-slate-800'}`}>{formatTZTime(currentTime, selectedTimeZone)}</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-4 mt-1">
                                <p className="text-sm font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">{currentDate}</p>
                                <button 
                                    onClick={() => setIsDarkMode(!isDarkMode)}
                                    className={`p-2 rounded-lg transition-all ${isDarkMode ? 'bg-slate-800 text-yellow-400 hover:bg-slate-700' : 'bg-white text-slate-400 hover:bg-slate-100 border border-slate-200'}`}
                                >
                                    {isDarkMode ? <Sun size={20} /> : <Moon size={20} />}
                                </button>
                            </div>
                            <button 
                                onClick={() => setShowAddForm(!showAddForm)}
                                className={`mt-2 inline-flex items-center gap-2 px-4 py-2 rounded-lg font-semibold transition-all shadow-lg active:scale-95 text-sm ${isDarkMode ? 'bg-white text-slate-900 hover:bg-slate-100' : 'bg-slate-800 text-white hover:bg-slate-900'}`}
                            >
                                {showAddForm ? <Minus size={16}/> : <UserPlus size={16} />}
                                {showAddForm ? 'Cancel' : 'Add Student'}
                            </button>
                        </div>
                    </header>

                    {showAddForm && !fullscreenStudentId && (
                        <div className={`max-w-2xl mx-auto mb-10 p-6 rounded-2xl shadow-xl border animate-fade-in ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'}`}>
                            <form onSubmit={addStudent} className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="space-y-1">
                                    <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase ml-1">Student Name</label>
                                    <input type="text" placeholder="e.g. Alex Johnson" className={`w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-colors ${isDarkMode ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50 border-slate-200 text-slate-900'}`} value={newName} onChange={(e) => setNewName(e.target.value)} />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase ml-1">Exam Name</label>
                                    <input type="text" placeholder="e.g. Biology Final" className={`w-full p-3 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-colors ${isDarkMode ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50 border-slate-200 text-slate-900'}`} value={newExam} onChange={(e) => setNewExam(e.target.value)} />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase ml-1">Hours</label>
                                    <input type="number" min="0" className={`w-full p-3 border rounded-xl outline-none transition-colors ${isDarkMode ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50 border-slate-200 text-slate-900'}`} value={newHours} onChange={(e) => setNewHours(e.target.value)} />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase ml-1">Minutes</label>
                                    <input type="number" min="0" max="59" className={`w-full p-3 border rounded-xl outline-none transition-colors ${isDarkMode ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50 border-slate-200 text-slate-900'}`} value={newMinutes} onChange={(e) => setNewMinutes(e.target.value)} />
                                </div>
                                <button type="submit" className={`md:col-span-2 w-full p-3 rounded-xl font-bold shadow-md transition-all ${isDarkMode ? 'bg-white text-slate-900 hover:bg-slate-100' : 'bg-slate-800 text-white hover:bg-slate-900'}`}>Initialize Timer</button>
                            </form>
                        </div>
                    )}

                    <div className={`max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 transition-all duration-500 ${fullscreenStudentId ? 'opacity-20 blur-md scale-95 pointer-events-none' : ''}`}>
                        {students.map((student, index) => (
                            <div 
                                key={student.id} 
                                draggable
                                onDragStart={(e) => onDragStart(e, index)}
                                onDragOver={onDragOver}
                                onDrop={(e) => onDrop(e, index)}
                                className={`relative border-2 rounded-3xl shadow-md dark:shadow-black/50 overflow-hidden transition-all duration-300 cursor-grab active:cursor-grabbing group animate-fade-in hover:-translate-y-2 hover:shadow-2xl dark:hover:shadow-[0_20px_50px_rgba(0,0,0,0.8)] dark:hover:border-white/20 ${
                                    student.secondsLeft === 0 
                                        ? `${isDarkMode ? 'border-red-600 bg-red-950/20' : 'border-red-500 bg-red-50'}` 
                                        : `${isDarkMode ? `${student.color.darkBg} ${student.isRunning ? `${student.color.border} ring-4 ${student.color.darkRing}` : 'border-slate-800'}` : `${student.color.lightBg} ${student.isRunning ? `${student.color.border} ring-4 ${student.color.ring}` : 'border-slate-200'}`}`
                                }`}
                            >
                                <div className="p-6 pb-4">
                                    <div className="flex justify-between items-start mb-2">
                                        <div className="flex-1 min-w-0">
                                            <h3 className={`text-2xl font-bold truncate leading-tight ${isDarkMode ? 'text-white' : 'text-slate-800'}`}>{student.name}</h3>
                                            <p className={`font-black uppercase text-sm tracking-widest ${isDarkMode ? student.color.darkText : student.color.text}`}>{student.exam}</p>
                                        </div>
                                        <div className="flex items-center gap-1">
                                            {student.secondsLeft === 0 && (
                                                <span className="bg-red-600 text-white text-[10px] font-black px-2 py-1 rounded uppercase animate-pulse shrink-0">Time Up</span>
                                            )}
                                            <button 
                                                onClick={() => setFullscreenStudentId(student.id)}
                                                className={`p-2 transition-opacity opacity-0 group-hover:opacity-100 ${isDarkMode ? 'text-slate-500 hover:text-white' : 'text-slate-400 hover:text-slate-800'}`}
                                            >
                                                <Maximize size={16} />
                                            </button>
                                        </div>
                                    </div>

                                    <div className={`text-6xl lg:text-7xl font-black tab-nums tracking-tighter my-4 ${
                                        student.secondsLeft < 300 ? 'text-red-600' : (isDarkMode ? 'text-white' : 'text-slate-900')
                                    }`}>
                                        {formatTime(student.secondsLeft, false)}
                                    </div>

                                    {/* Time Reference Group */}
                                    <div className={`mb-4 flex flex-wrap items-center gap-x-4 gap-y-2 font-bold text-xs uppercase tracking-wider ${isDarkMode ? 'text-slate-400' : 'text-slate-500'}`}>
                                        <div className="flex items-center gap-2">
                                            <span>Now:</span>
                                            <span className={`px-2 py-0.5 rounded-md ${isDarkMode ? 'bg-slate-800 text-slate-200' : 'bg-white shadow-sm text-slate-700'}`}>
                                                {formatHHMM(currentTime, selectedTimeZone)}
                                            </span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <span>Ends:</span>
                                            <span className={`px-2 py-0.5 rounded-md ${isDarkMode ? 'bg-slate-800 text-slate-200' : 'bg-white shadow-sm text-slate-700'}`}>
                                                {formatHHMM(new Date(currentTime.getTime() + student.secondsLeft * 1000), selectedTimeZone)}
                                            </span>
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-2 mb-4">
                                        <button 
                                            onClick={(e) => { e.stopPropagation(); adjustTime(student.id, 60); }}
                                            className={`p-2 rounded-xl font-bold text-sm border shadow-sm transition-all flex items-center justify-center gap-1 ${isDarkMode ? 'bg-slate-800 border-slate-700 text-slate-200 hover:bg-slate-700' : 'bg-white/60 border-black/5 text-slate-800 hover:bg-white/90'}`}
                                        >
                                            <Plus size={14} /> 1m
                                        </button>
                                        <button 
                                            onClick={(e) => { e.stopPropagation(); adjustTime(student.id, -60); }}
                                            className={`p-2 rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-1 ${isDarkMode ? 'bg-slate-800 text-slate-300 hover:bg-slate-700 border-none' : 'bg-black/5 text-slate-700 hover:bg-black/10'}`}
                                        >
                                            <Minus size={14} /> 1m
                                        </button>
                                    </div>

                                    {/* Notes Section */}
                                    <div className="mb-2">
                                        {student.showNotes ? (
                                            <textarea
                                                className={`w-full p-3 rounded-xl text-sm outline-none border transition-all resize-none h-24 ${isDarkMode ? 'bg-slate-900/50 border-slate-700 text-slate-200 focus:border-slate-500' : 'bg-white border-slate-200 text-slate-700 focus:border-slate-400'}`}
                                                placeholder="Add notes for this student..."
                                                value={student.notes}
                                                onChange={(e) => updateNotes(student.id, e.target.value)}
                                                onClick={(e) => e.stopPropagation()}
                                            />
                                        ) : student.notes && (
                                            <div className={`p-3 rounded-xl text-sm italic border-l-4 ${isDarkMode ? 'bg-slate-800/40 border-slate-600 text-slate-400' : 'bg-white/40 border-slate-300 text-slate-600'}`}>
                                                "{student.notes}"
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className={`border-t p-4 flex items-center justify-between transition-colors ${
                                    student.secondsLeft === 0 
                                        ? (isDarkMode ? 'bg-red-900/10 border-red-900/20' : 'bg-red-100/50 border-black/5') 
                                        : (isDarkMode ? 'bg-slate-900/40 border-slate-800' : `${student.color.footerBg} border-black/5`)
                                }`}>
                                    <div className="flex gap-2">
                                        <button 
                                            onClick={() => toggleTimer(student.id)}
                                            className={`w-12 h-12 flex items-center justify-center rounded-full transition-all shadow-md active:scale-90 ${
                                                student.isRunning 
                                                    ? (isDarkMode ? 'bg-white text-slate-900 hover:bg-slate-100' : 'bg-white text-slate-800 hover:bg-slate-50') 
                                                    : `${student.color.btn} text-white`
                                            }`}
                                        >
                                            {student.isRunning ? <Pause size={20} fill="currentColor" /> : <Play size={20} fill="currentColor" className="ml-1" />}
                                        </button>
                                        <button 
                                            onClick={() => resetTimer(student.id)} 
                                            className={`w-12 h-12 flex items-center justify-center rounded-full border shadow-sm active:scale-90 transition-colors ${isDarkMode ? 'bg-slate-800 text-slate-400 border-slate-700 hover:text-white' : 'bg-white/80 text-slate-600 border-black/5'}`}
                                        >
                                            <RotateCcw size={18} />
                                        </button>
                                        <button 
                                            onClick={() => toggleNotes(student.id)}
                                            className={`w-12 h-12 flex items-center justify-center rounded-full border shadow-sm active:scale-90 transition-colors ${
                                                student.showNotes 
                                                    ? (isDarkMode ? 'bg-white text-slate-900 border-white' : 'bg-slate-800 text-white border-slate-800') 
                                                    : (isDarkMode ? 'bg-slate-800 text-slate-400 border-slate-700 hover:text-white' : 'bg-white/80 text-slate-600 border-black/5')
                                            }`}
                                        >
                                            <StickyNote size={18} />
                                        </button>
                                    </div>
                                    
                                    <button onClick={() => removeStudent(student.id)} className={`w-12 h-12 flex items-center justify-center rounded-full transition-all ${isDarkMode ? 'text-slate-600 hover:text-red-400 hover:bg-red-900/20' : 'text-slate-400 hover:text-red-500 hover:bg-red-50/50'}`}>
                                        <Trash2 size={18} />
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {fullscreenStudent && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/60 backdrop-blur-2xl animate-fade-in p-4 md:p-12">
                            <div className={`w-full max-w-7xl aspect-video rounded-[3rem] shadow-2xl relative overflow-hidden transition-all duration-500 border-4 flex flex-col ${isDarkMode ? 'bg-slate-900 border-slate-800' : `border-white ${fullscreenStudent.color.lightBg}`}`}>
                                <button 
                                    onClick={() => setFullscreenStudentId(null)}
                                    className={`absolute top-8 right-8 w-16 h-16 flex items-center justify-center rounded-full transition-all z-10 ${isDarkMode ? 'bg-slate-800 text-white hover:bg-slate-700' : 'bg-white/20 hover:bg-white/40 text-slate-900'}`}
                                >
                                    <Minimize size={32} />
                                </button>

                                <div className="flex-1 flex flex-col items-center justify-center p-12">
                                    <p className={`font-black uppercase text-xl md:text-2xl tracking-[0.5em] mb-4 ${isDarkMode ? fullscreenStudent.color.darkText : fullscreenStudent.color.text}`}>{fullscreenStudent.exam}</p>
                                    <h2 className={`text-4xl md:text-6xl font-black text-center mb-12 ${isDarkMode ? 'text-white' : 'text-slate-800'}`}>{fullscreenStudent.name}</h2>
                                    
                                    <div className={`text-[10rem] md:text-[15rem] lg:text-[18rem] font-black tab-nums tracking-tighter leading-none ${
                                        fullscreenStudent.secondsLeft < 300 ? 'text-red-600 animate-pulse' : (isDarkMode ? 'text-white' : 'text-slate-900')
                                    }`}>
                                        {formatTime(fullscreenStudent.secondsLeft, false)}
                                    </div>

                                    {/* Time Reference Group (Fullscreen) */}
                                    <div className={`mb-12 flex flex-wrap items-center justify-center gap-12 font-black uppercase tracking-[0.3em] text-xl ${isDarkMode ? 'text-slate-500' : 'text-slate-400'}`}>
                                        <div className="flex items-center gap-4">
                                            <span>Now</span>
                                            <span className={`px-6 py-2 rounded-2xl ${isDarkMode ? 'bg-white/5 text-white' : 'bg-black/5 text-slate-800'}`}>
                                                {formatHHMM(currentTime, selectedTimeZone)}
                                            </span>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <span>Ends</span>
                                            <span className={`px-6 py-2 rounded-2xl ${isDarkMode ? 'bg-white/5 text-white' : 'bg-black/5 text-slate-800'}`}>
                                                {formatHHMM(new Date(currentTime.getTime() + fullscreenStudent.secondsLeft * 1000), selectedTimeZone)}
                                            </span>
                                        </div>
                                    </div>

                                    {/* Notes Section (Fullscreen Overlay) */}
                                    {fullscreenStudent.notes && (
                                        <div className={`max-w-3xl w-full p-8 rounded-[2rem] border-2 mb-12 text-center animate-fade-in ${
                                            isDarkMode ? 'bg-slate-950/40 border-slate-800 text-slate-300' : 'bg-white/50 border-white/20 text-slate-700'
                                        }`}>
                                            <p className="text-sm font-black uppercase tracking-widest mb-4 opacity-50">Exam Notes</p>
                                            <p className="text-2xl font-medium tracking-tight">"{fullscreenStudent.notes}"</p>
                                        </div>
                                    )}

                                    <div className="flex gap-8 items-center">
                                        <button 
                                            onClick={() => adjustTime(fullscreenStudent.id, -60)}
                                            className={`w-20 h-20 flex items-center justify-center rounded-2xl transition-all ${isDarkMode ? 'bg-slate-800 text-slate-300 hover:bg-slate-700' : 'bg-black/5 text-slate-700 hover:bg-black/10'}`}
                                        >
                                            <Minus size={32} />
                                        </button>
                                        <button 
                                            onClick={() => toggleTimer(fullscreenStudent.id)}
                                            className={`w-32 h-32 flex items-center justify-center rounded-full transition-all shadow-xl active:scale-95 ${
                                                fullscreenStudent.isRunning 
                                                    ? (isDarkMode ? 'bg-white text-slate-900' : 'bg-white text-slate-800') 
                                                    : `${fullscreenStudent.color.btn} text-white`
                                            }`}
                                        >
                                            {fullscreenStudent.isRunning ? <Pause size={48} fill="currentColor" /> : <Play size={48} fill="currentColor" className="ml-2" />}
                                        </button>
                                        <button 
                                            onClick={() => adjustTime(fullscreenStudent.id, 60)}
                                            className={`w-20 h-20 flex items-center justify-center rounded-2xl transition-all shadow-sm border ${isDarkMode ? 'bg-slate-800 border-slate-700 text-white hover:bg-slate-700' : 'bg-white border-slate-200 text-slate-800 hover:bg-slate-50'}`}
                                        >
                                            <Plus size={32} />
                                        </button>
                                    </div>
                                </div>

                                <div className={`p-8 flex justify-center border-t transition-colors ${isDarkMode ? 'bg-slate-950/30 border-slate-800' : `${fullscreenStudent.color.footerBg} border-black/5`}`}>
                                    <button 
                                        onClick={() => resetTimer(fullscreenStudent.id)}
                                        className={`flex items-center gap-3 px-8 py-4 rounded-2xl font-bold shadow-sm transition-all ${isDarkMode ? 'bg-slate-800 text-white hover:bg-slate-700' : 'bg-white text-slate-600 hover:bg-white'}`}
                                    >
                                        <RotateCcw size={24} /> Reset Exam
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
